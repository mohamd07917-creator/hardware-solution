<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مخططات الحلول الجاهزة - نسخة Firebase + GitHub</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* التصميم الكامل (كما هو سابق) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(145deg, #0d0f1a 0%, #1a1f30 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .container { width: 100%; max-width: 1400px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 40px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #fff; text-align: center; font-size: 2.5rem; margin-bottom: 30px; text-shadow: 0 0 20px rgba(0,255,255,0.7); }
        .main-panel { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; margin-bottom: 30px; }
        .panel { flex: 1 1 250px; background: rgba(10,20,30,0.7); backdrop-filter: blur(5px); border-radius: 30px; padding: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 0 0 1px rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; min-width: 250px; }
        .panel:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,200,255,0.2); }
        .panel-header { display: flex; align-items: center; gap: 10px; color: #00f7ff; font-size: 1.8rem; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .panel-header i { font-size: 2rem; color: #ffd700; }
        .panel-header h2 { font-size: 1.8rem; font-weight: 600; }
        .items-container { display: flex; flex-direction: column; gap: 12px; }
        .item-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 15px 20px; border-radius: 50px; font-size: 1.2rem; font-weight: 500; cursor: pointer; transition: all 0.3s ease; text-align: right; display: flex; align-items: center; gap: 15px; backdrop-filter: blur(5px); box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .item-btn i { font-size: 1.4rem; color: #00ffff; width: 30px; text-align: center; }
        .item-btn:hover { background: rgba(0,255,255,0.15); border-color: #00ffff; transform: scale(1.02); box-shadow: 0 0 15px #00ffff; }
        .item-btn.selected { background: rgba(0,255,255,0.25); border-color: #ffd700; box-shadow: 0 0 20px #ffd700; }
        .solutions-panel .item-btn { background: rgba(255,215,0,0.05); border-color: rgba(255,215,0,0.3); }
        .solutions-panel .item-btn i { color: #ffd700; }
        .solutions-panel .item-btn:hover { background: rgba(255,215,0,0.2); border-color: #ffd700; box-shadow: 0 0 15px #ffd700; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { position: relative; max-width: 90%; max-height: 90%; border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0,255,255,0.5); border: 2px solid rgba(255,255,255,0.2); background: #000; }
        .modal-content img { width: 100%; height: auto; display: block; cursor: zoom-in; }
        .close-modal { position: absolute; top: 15px; left: 15px; font-size: 40px; color: white; cursor: pointer; background: rgba(0,0,0,0.5); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; z-index: 1010; }
        .close-modal:hover { background: #ff0000; transform: rotate(90deg); }
        .loading-spinner { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid #00ffff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: translate(-50%,-50%) rotate(0deg); } 100% { transform: translate(-50%,-50%) rotate(360deg); } }
        .info-message { color: rgba(255,255,255,0.6); text-align: center; padding: 20px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ مخططات الحلول الجاهزة ✨</h1>
        <div class="main-panel">
            <!-- Brand Panel -->
            <div class="panel brands-panel">
                <div class="panel-header"><i class="fas fa-tag"></i><h2>البراندات</h2></div>
                <div class="items-container" id="brandsContainer"><div class="info-message">جاري تحميل البراندات...</div></div>
            </div>
            <!-- Models Panel -->
            <div class="panel models-panel">
                <div class="panel-header"><i class="fas fa-mobile-alt"></i><h2>الموديلات</h2></div>
                <div class="items-container" id="modelsContainer"><div class="info-message">اختر برانداً أولاً</div></div>
            </div>
            <!-- Solutions Panel -->
            <div class="panel solutions-panel">
                <div class="panel-header"><i class="fas fa-microchip"></i><h2>الحلول</h2></div>
                <div class="items-container" id="solutionsContainer"><div class="info-message">اختر موديلاً أولاً</div></div>
            </div>
        </div>
        <!-- Image Modal -->
        <div class="modal" id="imageModal">
            <span class="close-modal" id="closeModal">&times;</span>
            <div class="modal-content" id="modalContent">
                <img id="modalImage" src="" alt="مخطط الدائرة">
                <div class="loading-spinner" id="loadingSpinner"></div>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        // -------------------------------------------------------------
        // 1. إعدادات Firebase الخاصة بك (تم وضعها مباشرة)
        // -------------------------------------------------------------
        const firebaseConfig = {
            apiKey: "AIzaSyDKntmfI8dloN1Xx-TJw9m8S1OXbem6hNs",
            authDomain: "hardware-solotion.firebaseapp.com",
            projectId: "hardware-solotion",
            storageBucket: "hardware-solotion.firebasestorage.app",
            messagingSenderId: "586335779001",
            appId: "1:586335779001:web:09b94e39c5db11ea714368"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // -------------------------------------------------------------
        // 2. الحلول الثابتة (ثمانية دوائر)
        // -------------------------------------------------------------
        const solutionsList = [
            { ar: "دائرة الإضاءة", en: "flash" },
            { ar: "دائرة الشحن", en: "charging" },
            { ar: "دائرة الصوت", en: "audio" },
            { ar: "دائرة الواي فاي والبلوتوث", en: "wifi" },
            { ar: "دائرة التشغيل", en: "power" },
            { ar: "دائرة اللمس", en: "touch" },
            { ar: "فولتات الباور", en: "voltages" },
            { ar: "أسماء المكونات", en: "components" }
        ];

        // -------------------------------------------------------------
        // 3. متغيرات الحالة
        // -------------------------------------------------------------
        let selectedBrand = null;
        let selectedModel = null;
        let selectedSolution = null;

        // -------------------------------------------------------------
        // 4. دوال تحميل البيانات من Firestore
        // -------------------------------------------------------------
        function renderBrands() {
            const container = document.getElementById('brandsContainer');
            container.innerHTML = '<div class="info-message">جاري تحميل البراندات...</div>';
            db.collection('brands').get()
                .then((snapshot) => {
                    container.innerHTML = '';
                    if (snapshot.empty) {
                        container.innerHTML = '<div class="info-message">لا توجد براندات مضافة بعد</div>';
                        return;
                    }
                    snapshot.forEach(doc => {
                        const brand = doc.data().name;
                        const btn = document.createElement('div');
                        btn.className = 'item-btn';
                        btn.setAttribute('data-brand', brand);
                        btn.innerHTML = `<i class="fas fa-certificate"></i> ${brand}`;
                        btn.addEventListener('click', () => selectBrand(brand));
                        container.appendChild(btn);
                    });
                })
                .catch(error => {
                    console.error(error);
                    container.innerHTML = '<div class="info-message" style="color:#ff6b6b;">فشل تحميل البراندات</div>';
                });
        }

        function renderModels(brand) {
            const container = document.getElementById('modelsContainer');
            container.innerHTML = '<div class="info-message">جاري تحميل الموديلات...</div>';
            db.collection('models').where('brandId', '==', brand).get()
                .then((snapshot) => {
                    container.innerHTML = '';
                    if (snapshot.empty) {
                        container.innerHTML = '<div class="info-message">لا توجد موديلات لهذا البراند</div>';
                        return;
                    }
                    snapshot.forEach(doc => {
                        const model = doc.data().name;
                        const btn = document.createElement('div');
                        btn.className = 'item-btn';
                        btn.setAttribute('data-model', model);
                        btn.innerHTML = `<i class="fas fa-phone"></i> ${model}`;
                        btn.addEventListener('click', () => selectModel(model));
                        container.appendChild(btn);
                    });
                })
                .catch(error => {
                    console.error(error);
                    container.innerHTML = '<div class="info-message" style="color:#ff6b6b;">فشل تحميل الموديلات</div>';
                });
        }

        function renderSolutions() {
            const container = document.getElementById('solutionsContainer');
            container.innerHTML = '';
            solutionsList.forEach(sol => {
                const btn = document.createElement('div');
                btn.className = 'item-btn';
                btn.setAttribute('data-solution', sol.en);
                btn.innerHTML = `<i class="fas fa-circle"></i> ${sol.ar}`;
                btn.addEventListener('click', () => selectSolution(sol));
                container.appendChild(btn);
            });
        }

        // -------------------------------------------------------------
        // 5. دوال التحديد
        // -------------------------------------------------------------
        function selectBrand(brand) {
            selectedBrand = brand;
            selectedModel = null;
            selectedSolution = null;
            document.querySelectorAll('#brandsContainer .item-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.getAttribute('data-brand') === brand) btn.classList.add('selected');
            });
            renderModels(brand);
            document.getElementById('solutionsContainer').innerHTML = '<div class="info-message">اختر موديلاً أولاً</div>';
        }

        function selectModel(model) {
            selectedModel = model;
            document.querySelectorAll('#modelsContainer .item-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.getAttribute('data-model') === model) btn.classList.add('selected');
            });
            renderSolutions();
        }

        function selectSolution(solution) {
            selectedSolution = solution;
            document.querySelectorAll('#solutionsContainer .item-btn').forEach(btn => {
                btn.classList.remove('selected');
                if (btn.getAttribute('data-solution') === solution.en) btn.classList.add('selected');
            });
            loadImageFromGitHub(selectedBrand, selectedModel, solution.en);
        }

        // -------------------------------------------------------------
        // 6. تحميل الصورة من GitHub Raw
        //    ⚠️ قم بتغيير المتغيرين التاليين إلى بياناتك الفعلية
        // -------------------------------------------------------------
        function loadImageFromGitHub(brand, model, circuitEn) {
            if (!brand || !model || !circuitEn) {
                alert('الرجاء اختيار براند وموديل ودائرة أولاً');
                return;
            }

            // تنظيف اسم الموديل: استبدال المسافات بشرطة سفلية
            const cleanModel = model.trim().replace(/\s+/g, '_');
            
            // ========== غير البيانات التالية ==========
            const githubUsername = 'YOUR_GITHUB_USERNAME';  // اسم مستخدم GitHub الخاص بك
            const githubRepo = 'YOUR_REPOSITORY_NAME';      // اسم المستودع (مثل hardware-solution)
            // ==========================================
            
            const imageUrl = `https://raw.githubusercontent.com/${githubUsername}/${githubRepo}/main/images/${brand}/${cleanModel}/${circuitEn}.png`;

            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const spinner = document.getElementById('loadingSpinner');

            modal.classList.add('active');
            modalImg.style.display = 'none';
            spinner.style.display = 'block';

            fetch(imageUrl, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        modalImg.src = imageUrl;
                        modalImg.style.display = 'block';
                    } else {
                        throw new Error('الصورة غير موجودة');
                    }
                    spinner.style.display = 'none';
                })
                .catch(error => {
                    console.error(error);
                    spinner.style.display = 'none';
                    alert('الصورة غير موجودة في المسار:\n' + imageUrl);
                    modal.classList.remove('active');
                });
        }

        // -------------------------------------------------------------
        // 7. إغلاق النافذة المنبثقة
        // -------------------------------------------------------------
        document.getElementById('closeModal').addEventListener('click', function() {
            document.getElementById('imageModal').classList.remove('active');
            document.getElementById('modalImage').src = '';
        });
        window.addEventListener('click', function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target === modal) {
                modal.classList.remove('active');
                document.getElementById('modalImage').src = '';
            }
        });

        // -------------------------------------------------------------
        // 8. بدء التطبيق
        // -------------------------------------------------------------
        renderBrands();
    </script>
</body>
</html>
