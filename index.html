<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>مخططات الحلول الجاهزة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0c040;
    --dark: #0a0a12;
    --dark2: #12121e;
    --card: #16213e;
    --card2: #1e2a4a;
    --accent: #00d4ff;
    --text: #e8eaf6;
    --text2: #9aa0b8;
    --glow: rgba(0,212,255,0.18);
    --glow-gold: rgba(240,192,64,0.22);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--dark); font-family:'Cairo',sans-serif; color:var(--text); overflow-x:hidden; }

  #stars-bg {
    position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none;
    background: radial-gradient(ellipse at 20% 30%, rgba(0,80,180,0.13) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 70%, rgba(0,180,120,0.08) 0%, transparent 60%),
                var(--dark);
  }
  .star { position:absolute; border-radius:50%; background:#fff; animation: twinkle linear infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.1;} 50%{opacity:0.9;} }
  .particle { position:fixed; border-radius:50%; pointer-events:none; animation: float linear infinite; z-index:1; }
  @keyframes float { 0%{transform:translateY(100vh) scale(0);opacity:0;} 10%{opacity:1;} 90%{opacity:0.5;} 100%{transform:translateY(-10vh) scale(1);opacity:0;} }

  #app { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  header {
    width:100%; text-align:center; padding: 2.5rem 1rem 1.5rem;
    background: linear-gradient(180deg, rgba(0,212,255,0.07) 0%, transparent 100%);
    border-bottom: 1px solid rgba(0,212,255,0.1);
  }
  .logo-icon { font-size:3rem; display:block; margin-bottom:0.4rem; filter: drop-shadow(0 0 18px var(--accent)); animation: pulse-icon 3s ease-in-out infinite; }
  @keyframes pulse-icon { 0%,100%{filter:drop-shadow(0 0 10px var(--accent));} 50%{filter:drop-shadow(0 0 28px var(--accent));} }
  header h1 { font-size:1.8rem; font-weight:900; background:linear-gradient(90deg, var(--accent), var(--gold), var(--accent)); background-clip:text; -webkit-background-clip:text; color:transparent; letter-spacing:1px; }
  header p { color:var(--text2); font-size:0.9rem; margin-top:0.3rem; }

  #breadcrumb { display:flex; align-items:center; gap:8px; padding:0.8rem 1.5rem; width:100%; max-width:700px; font-size:0.82rem; color:var(--text2); flex-wrap:wrap; }
  .bc-item { color:var(--accent); cursor:pointer; transition:color 0.2s; }
  .bc-item:hover { color:var(--gold); }
  .bc-sep { color:rgba(255,255,255,0.2); }
  .bc-current { color:var(--text); }

  .section-title { font-size:1rem; color:var(--text2); margin:0.5rem 0 1.2rem; text-align:center; letter-spacing:2px; text-transform:uppercase; }
  .section-title span { color:var(--gold); }

  .screen { width:100%; max-width:700px; padding:0.5rem 1rem 2rem; animation: fadeUp 0.45s cubic-bezier(.22,1,.36,1); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }
  .screen.hidden { display:none; }

  #brands-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(130px, 1fr)); gap:14px; }
  .brand-card {
    background: linear-gradient(145deg, var(--card), var(--card2));
    border: 1px solid rgba(0,212,255,0.12); border-radius:16px; padding:1.2rem 0.5rem; text-align:center; cursor:pointer;
    transition: all 0.3s cubic-bezier(.22,1,.36,1); position:relative; overflow:hidden;
  }
  .brand-card::before { content:''; position:absolute; inset:0; border-radius:16px; background:linear-gradient(135deg, rgba(0,212,255,0.08), transparent); opacity:0; transition:opacity 0.3s; }
  .brand-card:hover::before { opacity:1; }
  .brand-card:hover { transform:translateY(-5px) scale(1.03); border-color:var(--accent); box-shadow:0 8px 32px rgba(0,212,255,0.22), 0 2px 8px rgba(0,0,0,0.4); }
  .brand-card:active { transform:scale(0.97); }
  .brand-logo-placeholder { width:54px; height:54px; margin:0 auto 0.6rem; display:flex; align-items:center; justify-content:center; font-size:1.8rem; border-radius:12px; background:rgba(0,212,255,0.07); }
  .brand-name { font-size:0.88rem; font-weight:700; color:var(--text); }
  .brand-num { position:absolute; top:7px; right:10px; font-size:0.68rem; color:var(--accent); font-weight:600; opacity:0.7; }

  #models-list { display:flex; flex-direction:column; gap:10px; }
  .model-item {
    background:linear-gradient(135deg, var(--card), var(--card2)); border:1px solid rgba(255,255,255,0.07); border-radius:14px;
    padding:1rem 1.2rem; cursor:pointer; display:flex; align-items:center; gap:12px;
    transition:all 0.3s cubic-bezier(.22,1,.36,1);
  }
  .model-item:hover { border-color:var(--gold); transform:translateX(-4px); box-shadow:0 4px 20px var(--glow-gold); }
  .model-item:active { transform:scale(0.98); }
  .model-icon { font-size:1.5rem; }
  .model-name { font-size:0.95rem; font-weight:600; flex:1; }
  .model-arrow { color:var(--text2); font-size:1.1rem; }

  #solutions-grid { display:grid; grid-template-columns:repeat(2, 1fr); gap:13px; }
  .sol-card {
    background:linear-gradient(145deg, var(--card), var(--card2)); border:1px solid rgba(255,255,255,0.07); border-radius:16px;
    padding:1.3rem 0.8rem; text-align:center; cursor:pointer; transition:all 0.3s cubic-bezier(.22,1,.36,1); position:relative; overflow:hidden;
  }
  .sol-card::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:40%; height:2px; border-radius:2px; background:linear-gradient(90deg, transparent, var(--accent), transparent); opacity:0; transition:opacity 0.3s; }
  .sol-card:hover::after { opacity:1; }
  .sol-card:hover { transform:translateY(-4px); border-color:var(--accent); box-shadow:0 8px 24px var(--glow); }
  .sol-card:active { transform:scale(0.96); }
  .sol-icon { font-size:2.2rem; display:block; margin-bottom:0.5rem; }
  .sol-name { font-size:0.88rem; font-weight:700; color:var(--text); line-height:1.4; }

  #image-viewer { position:fixed; inset:0; z-index:100; background:rgba(5,5,15,0.97); display:flex; flex-direction:column; align-items:center; justify-content:center; animation:fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  #image-viewer.hidden { display:none; }
  #viewer-header { position:absolute; top:0; left:0; right:0; padding:1rem 1.2rem; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%); }
  #viewer-title { font-size:1rem; font-weight:700; color:var(--gold); }
  #close-viewer { width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s; }
  #close-viewer:hover { background:rgba(255,80,80,0.4); }
  #viewer-img-container { width:100%; height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; touch-action:none; padding-top:60px; padding-bottom:60px; }
  #viewer-img { max-width:95%; max-height:80vh; object-fit:contain; border-radius:8px; box-shadow:0 0 60px rgba(0,212,255,0.2); transform-origin:center center; user-select:none; -webkit-user-select:none; }
  #viewer-loading { position:absolute; display:flex; flex-direction:column; align-items:center; gap:14px; }
  .spinner { width:48px; height:48px; border:3px solid rgba(0,212,255,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }
  #viewer-hint { position:absolute; bottom:1.2rem; font-size:0.78rem; color:rgba(255,255,255,0.35); text-align:center; }

  .back-btn { display:inline-flex; align-items:center; gap:8px; margin-bottom:1rem; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:0.5rem 1rem; cursor:pointer; font-family:'Cairo',sans-serif; color:var(--text2); font-size:0.88rem; transition:all 0.2s; }
  .back-btn:hover { background:rgba(0,212,255,0.1); color:var(--accent); border-color:var(--accent); }

  .search-wrap { margin-bottom:1rem; position:relative; }
  .search-input { width:100%; background:var(--card); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:0.75rem 1rem 0.75rem 2.8rem; color:var(--text); font-family:'Cairo',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--text2); }
  .search-icon { position:absolute; left:0.9rem; top:50%; transform:translateY(-50%); color:var(--text2); font-size:1rem; }
</style>
</head>
<body>

<div id="stars-bg"></div>
<div id="app">
  <header>
    <span class="logo-icon">📱</span>
    <h1>مخططات الحلول الجاهزة</h1>
    <p>اختر الجهاز وعرض مخططات الدوائر الإلكترونية</p>
  </header>

  <div id="breadcrumb"></div>

  <div id="screen-brands" class="screen">
    <p class="section-title">اختر <span>البراند</span></p>
    <div id="brands-grid"></div>
  </div>

  <div id="screen-models" class="screen hidden">
    <button class="back-btn" onclick="goBack('brands')">&#8594; رجوع</button>
    <p class="section-title">موديلات <span id="brand-title-display"></span></p>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" class="search-input" id="model-search" placeholder="ابحث عن موديل..." oninput="filterModels()">
    </div>
    <div id="models-list"></div>
  </div>

  <div id="screen-solutions" class="screen hidden">
    <button class="back-btn" onclick="goBack('models')">&#8594; رجوع</button>
    <p class="section-title">حلول <span id="model-title-display"></span></p>
    <div id="solutions-grid"></div>
  </div>
</div>

<div id="image-viewer" class="hidden">
  <div id="viewer-header">
    <span id="viewer-title">عرض المخطط</span>
    <button id="close-viewer" onclick="closeViewer()">&#10005;</button>
  </div>
  <div id="viewer-img-container">
    <div id="viewer-loading">
      <div class="spinner"></div>
      <span style="color:var(--text2);font-size:0.88rem;">جاري التحميل...</span>
    </div>
    <img id="viewer-img" style="display:none;" alt="مخطط الدائرة">
  </div>
  <div id="viewer-hint">&#129307; استخدم إصبعين للتكبير والتصغير — انقر مرتين للإعادة</div>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getStorage, ref, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
const firebaseConfig = {
  apiKey: "AIzaSyDKntmfI8dloN1Xx-TJw9m8S1OXbem6hNs",
  authDomain: "hardware-solotion.firebaseapp.com",
  projectId: "hardware-solotion",
  storageBucket: "hardware-solotion.firebasestorage.app",
  messagingSenderId: "586335779001",
  appId: "1:586335779001:web:09b94e39c5db11ea714368"
};
const fbApp = initializeApp(firebaseConfig);
const storage = getStorage(fbApp);
window._fbStorage = storage;
window._fbRef = ref;
window._fbGetURL = getDownloadURL;
</script>

<script>
const BRANDS = [
  { id:'samsung',  name:'Samsung',  icon:'&#128308;' },
  { id:'infinix',  name:'Infinix',  icon:'&#128994;' },
  { id:'tecno',    name:'Tecno',    icon:'&#128993;' },
  { id:'xiaomi',   name:'Xiaomi',   icon:'&#128992;' },
  { id:'oppo',     name:'Oppo',     icon:'&#128995;' },
  { id:'realme',   name:'Realme',   icon:'&#129002;' },
  { id:'vivo',     name:'Vivo',     icon:'&#128309;' },
  { id:'apple',    name:'Apple',    icon:'&#127822;' },
  { id:'nokia',    name:'Nokia',    icon:'&#11035;'  },
  { id:'huawei',   name:'Huawei',   icon:'&#127800;' },
  { id:'honor',    name:'Honor',    icon:'&#11088;'  },
  { id:'zte',      name:'ZTE',      icon:'&#9632;'   },
  { id:'itel',     name:'Itel',     icon:'&#128307;' },
  { id:'oneplus',  name:'OnePlus',  icon:'&#128308;' },
  { id:'motorola', name:'Motorola', icon:'&#127952;' },
];

const MODELS = {
  samsung: ['Galaxy A05','Galaxy A15','Galaxy A25','Galaxy A35','Galaxy A55','Galaxy A14','Galaxy A34','Galaxy A54','Galaxy S23','Galaxy S24','Galaxy S24 Ultra','Galaxy M14','Galaxy M34','Galaxy M54','Galaxy Note 20','Galaxy Note 10'],
  infinix: ['Hot 40','Hot 40i','Hot 30','Hot 20','Note 40','Note 30','Note 12','Smart 8','Smart 7','Zero 30','Zero 20','GT 20 Pro'],
  tecno: ['Spark 20','Spark 20 Pro','Spark 10','Camon 20','Camon 30','Pop 8','Pop 7','Pova 6','Pova 5','Phantom X2'],
  xiaomi: ['Redmi 13','Redmi 12','Redmi Note 13','Redmi Note 12','POCO X6','POCO M6','Xiaomi 14','Xiaomi 13T','Redmi A3','Redmi A2'],
  oppo: ['A78','A58','A38','A18','Reno 11','Reno 10','Find X7','A17','A57','F25 Pro'],
  realme: ['C67','C55','C35','C30','Narzo 70','12 Pro','12','GT 6','GT Neo 6','10 Pro'],
  vivo: ['Y38','Y28','Y18','Y17s','V30','V29','T3','Y36','S18','X100'],
  apple: ['iPhone 16 Pro Max','iPhone 16 Pro','iPhone 16','iPhone 15 Pro Max','iPhone 15 Pro','iPhone 15','iPhone 14 Pro Max','iPhone 14','iPhone 13','iPhone 13 Pro','iPhone 12','iPhone 11','iPhone XS','iPhone XR','iPhone X'],
  nokia: ['C32','C22','G42','G21','X30','XR21','C12','G60','C31','5.4'],
  huawei: ['Nova 12','Nova 11','Nova 10','Mate 60 Pro','P60 Pro','P50 Pro','Y91','Y61','Y70','Nova 9'],
  honor: ['X8b','X7b','90','200 Pro','Magic 6 Pro','Magic V2','X9b','90 Smart','70','X6a'],
  zte: ['Blade V50','Blade A75','Blade V40','Blade A54','Nubia Z60 Ultra','Nubia Z50','Blade A52','V50 Vita','Blade A31'],
  itel: ['A70','A60s','P55','S24','Vision 3 Plus','A58','Magic 3','P40','A48','S23 Plus'],
  oneplus: ['12','11','Nord 4','Nord CE4','Nord 3','12R','Open','11R','10 Pro','10T'],
  motorola: ['Edge 50 Pro','Edge 50 Fusion','Moto G85','Moto G54','Moto G34','Edge 40 Neo','Moto E14','Moto G14','Edge 30','Razr 50'],
};

const SOLUTIONS = [
  { id:'lighting',   name:'دائرة الإضاءة',            icon:'&#128161;', path:'lighting'   },
  { id:'charging',   name:'دائرة الشحن',              icon:'&#128267;', path:'charging'   },
  { id:'audio',      name:'دائرة الصوت',              icon:'&#128266;', path:'audio'      },
  { id:'wifi_bt',    name:'دائرة الواي فاي والبلوتوث', icon:'&#128246;', path:'wifi_bt'    },
  { id:'power',      name:'دائرة التشغيل',            icon:'&#9889;',   path:'power'      },
  { id:'touch',      name:'دائرة اللمس',              icon:'&#128070;', path:'touch'      },
  { id:'voltages',   name:'فولتات الباور',             icon:'&#128268;', path:'voltages'   },
  { id:'components', name:'أسماء المكونات',           icon:'&#128295;', path:'components' },
];

let selectedBrand = null, selectedModel = null, allModels = [];

// Stars
(function() {
  const bg = document.getElementById('stars-bg');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = 'width:'+size+'px;height:'+size+'px;top:'+(Math.random()*100)+'%;left:'+(Math.random()*100)+'%;animation-duration:'+(2+Math.random()*4)+'s;animation-delay:'+(Math.random()*4)+'s;opacity:'+(0.1+Math.random()*0.6);
    bg.appendChild(s);
  }
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 4 + 2;
    const col = Math.random() > 0.5 ? '0,212,255' : '240,192,64';
    p.style.cssText = 'width:'+size+'px;height:'+size+'px;left:'+(Math.random()*100)+'%;background:rgba('+col+',0.5);animation-duration:'+(8+Math.random()*12)+'s;animation-delay:'+(Math.random()*8)+'s;';
    document.body.appendChild(p);
  }
})();

function renderBrands() {
  const grid = document.getElementById('brands-grid');
  grid.innerHTML = '';
  BRANDS.forEach((b, i) => {
    const card = document.createElement('div');
    card.className = 'brand-card';
    card.innerHTML = '<span class="brand-num">'+(i+1)+'</span><div class="brand-logo-placeholder">'+b.icon+'</div><div class="brand-name">'+b.name+'</div>';
    card.onclick = () => selectBrand(b);
    grid.appendChild(card);
  });
}

function selectBrand(brand) {
  selectedBrand = brand;
  document.getElementById('brand-title-display').textContent = brand.name;
  allModels = MODELS[brand.id] || [];
  renderModels(allModels);
  showScreen('models');
  updateBreadcrumb();
}

function renderModels(models) {
  const list = document.getElementById('models-list');
  list.innerHTML = '';
  if (!models.length) {
    list.innerHTML = '<p style="text-align:center;color:var(--text2);padding:2rem;">لا توجد موديلات مطابقة</p>';
    return;
  }
  models.forEach(m => {
    const item = document.createElement('div');
    item.className = 'model-item';
    item.innerHTML = '<span class="model-icon">&#128241;</span><span class="model-name">'+m+'</span><span class="model-arrow">&#8592;</span>';
    item.onclick = () => selectModel(m);
    list.appendChild(item);
  });
}

window.filterModels = function() {
  const q = document.getElementById('model-search').value.toLowerCase().trim();
  renderModels(q ? allModels.filter(m => m.toLowerCase().includes(q)) : allModels);
};

function selectModel(model) {
  selectedModel = model;
  document.getElementById('model-title-display').textContent = model;
  renderSolutions();
  showScreen('solutions');
  updateBreadcrumb();
}

function renderSolutions() {
  const grid = document.getElementById('solutions-grid');
  grid.innerHTML = '';
  SOLUTIONS.forEach(sol => {
    const card = document.createElement('div');
    card.className = 'sol-card';
    card.innerHTML = '<span class="sol-icon">'+sol.icon+'</span><span class="sol-name">'+sol.name+'</span>';
    card.onclick = () => openSolution(sol);
    grid.appendChild(card);
  });
}

async function openSolution(sol) {
  document.getElementById('viewer-title').textContent = sol.name + ' \u2014 ' + selectedModel;
  document.getElementById('viewer-loading').style.display = 'flex';
  const img = document.getElementById('viewer-img');
  img.style.display = 'none';
  const err = document.getElementById('viewer-img-container').querySelector('.error-msg');
  if (err) err.remove();
  document.getElementById('image-viewer').classList.remove('hidden');

  const filePath = selectedBrand.id + '/' + selectedModel.replace(/\s+/g,'_') + '/' + sol.path + '.jpg';

  try {
    await waitForFirebase();
    const storageRef = window._fbRef(window._fbStorage, filePath);
    const url = await window._fbGetURL(storageRef);
    img.onload = () => { document.getElementById('viewer-loading').style.display = 'none'; img.style.display = 'block'; };
    img.onerror = () => { document.getElementById('viewer-loading').style.display = 'none'; showImageError(filePath); };
    img.src = url;
  } catch(err) {
    document.getElementById('viewer-loading').style.display = 'none';
    showImageError(filePath);
  }
}

function showImageError(path) {
  const container = document.getElementById('viewer-img-container');
  const msg = document.createElement('div');
  msg.className = 'error-msg';
  msg.style.cssText = 'text-align:center;color:var(--text2);';
  msg.innerHTML = '<div style="font-size:3rem;margin-bottom:1rem;">&#128269;</div><p style="font-size:0.95rem;">الصورة غير متوفرة بعد</p><p style="font-size:0.75rem;margin-top:0.5rem;opacity:0.5;direction:ltr;">'+path+'</p>';
  container.appendChild(msg);
}

function waitForFirebase(timeout) {
  timeout = timeout || 6000;
  return new Promise(function(res, rej) {
    const start = Date.now();
    (function check() {
      if (window._fbStorage && window._fbRef && window._fbGetURL) return res();
      if (Date.now() - start > timeout) return rej(new Error('Firebase not ready'));
      setTimeout(check, 80);
    })();
  });
}

// Pinch zoom
let imgScale=1, lastDist=0, startScale=1, isDragging=false, lastX=0, lastY=0, translateX=0, translateY=0;
const imgEl = document.getElementById('viewer-img');
const viewerContainer = document.getElementById('viewer-img-container');

viewerContainer.addEventListener('touchstart', function(e) {
  if (e.touches.length === 2) {
    lastDist = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    startScale = imgScale;
  } else if (e.touches.length === 1 && imgScale > 1) {
    isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }
}, {passive:true});

viewerContainer.addEventListener('touchmove', function(e) {
  if (e.touches.length === 2) {
    e.preventDefault();
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    imgScale = Math.min(5, Math.max(1, startScale * (d / lastDist)));
    applyTransform();
  } else if (e.touches.length === 1 && isDragging) {
    e.preventDefault();
    translateX += e.touches[0].clientX - lastX; translateY += e.touches[0].clientY - lastY;
    lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
    applyTransform();
  }
}, {passive:false});

viewerContainer.addEventListener('touchend', function(e) {
  if (e.touches.length < 2) isDragging = false;
  if (imgScale <= 1) { imgScale=1; translateX=0; translateY=0; applyTransform(); }
});

let lastTap = 0;
viewerContainer.addEventListener('touchend', function() {
  const now = Date.now();
  if (now - lastTap < 300) { imgScale=1; translateX=0; translateY=0; applyTransform(); }
  lastTap = now;
});

function applyTransform() {
  imgEl.style.transform = 'translate('+translateX+'px,'+translateY+'px) scale('+imgScale+')';
}

window.closeViewer = function() {
  document.getElementById('image-viewer').classList.add('hidden');
  imgScale=1; translateX=0; translateY=0; applyTransform();
  const img = document.getElementById('viewer-img');
  img.src=''; img.style.display='none';
  const err = document.getElementById('viewer-img-container').querySelector('.error-msg');
  if (err) err.remove();
  document.getElementById('viewer-loading').style.display = 'flex';
};

function showScreen(name) {
  ['brands','models','solutions'].forEach(function(s) {
    document.getElementById('screen-'+s).classList.toggle('hidden', s !== name);
  });
  window.scrollTo({top:0, behavior:'smooth'});
}

window.goBack = function(to) {
  if (to === 'brands') { selectedBrand=null; selectedModel=null; }
  if (to === 'models') { selectedModel=null; document.getElementById('model-search').value=''; renderModels(allModels); }
  showScreen(to);
  updateBreadcrumb();
};

function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  let html = '<span class="bc-item" onclick="goBack(\'brands\')">&#127968; الرئيسية</span>';
  if (selectedBrand) html += '<span class="bc-sep">&#8250;</span><span class="bc-item" onclick="goBack(\'models\')">'+selectedBrand.name+'</span>';
  if (selectedModel) html += '<span class="bc-sep">&#8250;</span><span class="bc-current">'+selectedModel+'</span>';
  bc.innerHTML = html;
}

renderBrands();
updateBreadcrumb();
</script>
</body>
</html>
