<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f0c040;
    --dark: #0a0a12;
    --card: #16213e;
    --card2: #1e2a4a;
    --accent: #00d4ff;
    --text: #e8eaf6;
    --text2: #9aa0b8;
    --glow: rgba(0,212,255,0.18);
    --glow-gold: rgba(240,192,64,0.22);

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; background:var(--dark); font-family:'Cairo',sans-serif; color:var(--text); overflow-x:hidden; }

  #stars-bg {

                radial-gradient(ellipse at 80% 70%, rgba(0,180,120,0.08) 0%, transparent 60%), var(--dark);
  }
  .star { position:absolute; border-radius:50%; background:#fff; animation:twinkle linear infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.1;} 50%{opacity:0.9;} }
  .particle { position:fixed; border-radius:50%; pointer-events:none; animation:float linear infinite; z-index:1; }
  @keyframes float { 0%{transform:translateY(100vh) scale(0);opacity:0;} 10%{opacity:1;} 90%{opacity:0.5;} 100%{transform:translateY(-10vh) scale(1);opacity:0;} }

  #app { position:relative; z-index:2; min-height:100vh; display:flex; flex-direction:column; align-items:center; }

  header { width:100%; text-align:center; padding:2.5rem 1rem 1.5rem; background:linear-gradient(180deg,rgba(0,212,255,0.07) 0%,transparent 100%); border-bottom:1px solid rgba(0,212,255,0.1); }
  .logo-icon { font-size:3rem; display:block; margin-bottom:0.4rem; animation:pulse-icon 3s ease-in-out infinite; }
  @keyframes pulse-icon { 0%,100%{filter:drop-shadow(0 0 10px var(--accent));} 50%{filter:drop-shadow(0 0 28px var(--accent));} }
  header h1 { font-size:1.8rem; font-weight:900; background:linear-gradient(90deg,var(--accent),var(--gold),var(--accent)); background-clip:text; -webkit-background-clip:text; color:transparent; }
  header p { color:var(--text2); font-size:0.9rem; margin-top:0.3rem; }

  #breadcrumb { display:flex; align-items:center; gap:8px; padding:0.8rem 1.5rem; width:100%; max-width:700px; font-size:0.82rem; flex-wrap:wrap; }
  .bc-item { color:var(--accent); cursor:pointer; transition:color 0.2s; }
  .bc-item:hover { color:var(--gold); }
  .bc-sep { color:rgba(255,255,255,0.2); }
  .bc-current { color:var(--text); }

  .section-title { font-size:1rem; color:var(--text2); margin:0.5rem 0 1.2rem; text-align:center; letter-spacing:2px; }
  .section-title span { color:var(--gold); }

  .screen { width:100%; max-width:700px; padding:0.5rem 1rem 2rem; animation:fadeUp 0.45s cubic-bezier(.22,1,.36,1); }
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }
  .screen.hidden { display:none; }

  #brands-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:14px; }
  .brand-card { background:linear-gradient(145deg,var(--card),var(--card2)); border:1px solid rgba(0,212,255,0.12); border-radius:16px; padding:1.2rem 0.5rem; text-align:center; cursor:pointer; transition:all 0.3s cubic-bezier(.22,1,.36,1); position:relative; overflow:hidden; }
  .brand-card::before { content:''; position:absolute; inset:0; border-radius:16px; background:linear-gradient(135deg,rgba(0,212,255,0.08),transparent); opacity:0; transition:opacity 0.3s; }
  .brand-card:hover::before { opacity:1; }
  .brand-card:hover { transform:translateY(-5px) scale(1.03); border-color:var(--accent); box-shadow:0 8px 32px rgba(0,212,255,0.22); }
  .brand-card:active { transform:scale(0.97); }
  .brand-logo-placeholder { width:54px; height:54px; margin:0 auto 0.6rem; display:flex; align-items:center; justify-content:center; font-size:1.8rem; border-radius:12px; background:rgba(0,212,255,0.07); }
  .brand-name { font-size:0.88rem; font-weight:700; }
  .brand-num { position:absolute; top:7px; right:10px; font-size:0.68rem; color:var(--accent); font-weight:600; opacity:0.7; }

  #models-list { display:flex; flex-direction:column; gap:10px; }
  .model-item { background:linear-gradient(135deg,var(--card),var(--card2)); border:1px solid rgba(255,255,255,0.07); border-radius:14px; padding:1rem 1.2rem; cursor:pointer; display:flex; align-items:center; gap:12px; transition:all 0.3s cubic-bezier(.22,1,.36,1); }
  .model-item:hover { border-color:var(--gold); transform:translateX(-4px); box-shadow:0 4px 20px var(--glow-gold); }
  .model-item:active { transform:scale(0.98); }
  .model-icon { font-size:1.5rem; }
  .model-name { font-size:0.95rem; font-weight:600; flex:1; }
  .model-arrow { color:var(--text2); }

  #solutions-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:13px; }
  .sol-card { background:linear-gradient(145deg,var(--card),var(--card2)); border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:1.3rem 0.8rem; text-align:center; cursor:pointer; transition:all 0.3s cubic-bezier(.22,1,.36,1); position:relative; overflow:hidden; }
  .sol-card::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:40%; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); opacity:0; transition:opacity 0.3s; }
  .sol-card:hover::after { opacity:1; }
  .sol-card:hover { transform:translateY(-4px); border-color:var(--accent); box-shadow:0 8px 24px var(--glow); }
  .sol-card:active { transform:scale(0.96); }
  .sol-icon { font-size:2.2rem; display:block; margin-bottom:0.5rem; }
  .sol-name { font-size:0.88rem; font-weight:700; line-height:1.4; }

  /* VIEWER */
  #image-viewer { position:fixed; inset:0; z-index:100; background:rgba(5,5,15,0.98); display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #image-viewer.hidden { display:none; }
  #viewer-header { position:absolute; top:0; left:0; right:0; padding:1rem 1.2rem; display:flex; align-items:center; justify-content:space-between; background:linear-gradient(180deg,rgba(0,0,0,0.85) 0%,transparent 100%); z-index:2; }
  #viewer-title { font-size:0.92rem; font-weight:700; color:var(--gold); flex:1; padding-left:10px; }
  #close-viewer { width:38px; height:38px; border-radius:50%; background:rgba(255,255,255,0.1); border:none; color:#fff; font-size:1.3rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.2s; flex-shrink:0; }
  #close-viewer:hover { background:rgba(255,80,80,0.5); }
  #viewer-img-container { width:100%; height:100%; display:flex; align-items:center; justify-content:center; overflow:hidden; touch-action:none; padding:70px 8px; position:relative; }
  #viewer-img { max-width:100%; max-height:100%; object-fit:contain; border-radius:8px; box-shadow:0 0 60px rgba(0,212,255,0.15); transform-origin:center center; user-select:none; -webkit-user-select:none; display:none; }
  #viewer-loading { display:flex; flex-direction:column; align-items:center; gap:14px; }
  #viewer-loading.hidden { display:none; }
  .spinner { width:48px; height:48px; border:3px solid rgba(0,212,255,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg);} }
  #viewer-hint { position:absolute; bottom:1rem; font-size:0.75rem; color:rgba(255,255,255,0.3); text-align:center; pointer-events:none; }

  /* error box inside viewer */
  #viewer-error { display:none; flex-direction:column; align-items:center; gap:12px; text-align:center; padding:1rem; }
  #viewer-error.show { display:flex; }
  #viewer-error .err-icon { font-size:3rem; }
  #viewer-error .err-title { font-size:1rem; color:var(--text2); }
  #viewer-error .err-path { font-size:0.7rem; color:rgba(255,255,255,0.25); direction:ltr; word-break:break-all; max-width:320px; margin-top:4px; }
  #viewer-error .err-hint { font-size:0.78rem; color:rgba(0,212,255,0.6); margin-top:4px; }

  .back-btn { display:inline-flex; align-items:center; gap:8px; margin-bottom:1rem; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:0.5rem 1rem; cursor:pointer; font-family:'Cairo',sans-serif; color:var(--text2); font-size:0.88rem; transition:all 0.2s; }

  .search-wrap { margin-bottom:1rem; position:relative; }
  .search-input { width:100%; background:var(--card); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:0.75rem 1rem 0.75rem 2.8rem; color:var(--text); font-family:'Cairo',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s; }

  </header>
  <div id="breadcrumb"></div>

  <div id="screen-brands" class="screen">

    <div id="brands-grid"></div>
  </div>

  <div id="screen-models" class="screen hidden">
    <button class="back-btn" onclick="goBack('brands')">&#8594; رجوع</button>
    <p class="section-title">موديلات <span id="brand-title-display"></span></p>
    <div class="search-wrap">
      <span class="search-icon">&#128269;</span>
      <input type="text" class="search-input" id="model-search" placeholder="ابحث عن موديل..." oninput="filterModels()">
    </div>
    <div id="models-list"></div>
  </div>

  <div id="screen-solutions" class="screen hidden">
    <button class="back-btn" onclick="goBack('models')">&#8594; رجوع</button>
    <p class="section-title">حلول <span id="model-title-display"></span></p>
    <div id="solutions-grid"></div>
  </div>
</div>

  <div id="viewer-hint">&#129307; إصبعين للتكبير &nbsp;|&nbsp; نقر مزدوج للإعادة</div>

// ============ BRANDS ============
function renderBrands(){
  var g=document.getElementById('brands-grid'); g.innerHTML='';
  BRANDS.forEach(function(b,i){
    var c=document.createElement('div'); c.className='brand-card';
    c.innerHTML='<span class="brand-num">'+(i+1)+'</span><div class="brand-logo-placeholder">'+b.icon+'</div><div class="brand-name">'+b.name+'</div>';
    c.onclick=function(){ selectBrand(b); };

}
function selectBrand(b){
  selectedBrand=b;
  document.getElementById('brand-title-display').textContent=b.name;
  allModels=MODELS[b.id]||[];
  document.getElementById('model-search').value='';
  renderModels(allModels);

}

// ============ MODELS ============
function renderModels(list){
  var el=document.getElementById('models-list'); el.innerHTML='';
  if(!list.length){ el.innerHTML='<p style="text-align:center;color:var(--text2);padding:2rem;">لا توجد نتائج</p>'; return; }
  list.forEach(function(m){
    var item=document.createElement('div'); item.className='model-item';
    item.innerHTML='<span class="model-icon">&#128241;</span><span class="model-name">'+m.name+'</span><span class="model-arrow">&#8592;</span>';
    item.onclick=function(){ selectModel(m); };
    el.appendChild(item);
  });
}
window.filterModels=function(){
  var q=document.getElementById('model-search').value.toLowerCase().trim();
  renderModels(q ? allModels.filter(function(m){ return m.name.toLowerCase().includes(q); }) : allModels);
};
function selectModel(m){
  selectedModel=m;
  document.getElementById('model-title-display').textContent=m.name;
  renderSolutions();
  showScreen('solutions');
  updateBreadcrumb();
}

// ============ SOLUTIONS ============
function renderSolutions(){
  var g=document.getElementById('solutions-grid'); g.innerHTML='';
  SOLUTIONS.forEach(function(sol){
    var c=document.createElement('div'); c.className='sol-card';
    c.innerHTML='<span class="sol-icon">'+sol.icon+'</span><span class="sol-name">'+sol.name+'</span>';
    c.onclick=function(){ openSolution(sol); };
    g.appendChild(c);
  });
}

// ============ OPEN IMAGE ============
function openSolution(sol){
  // أظهر الـ viewer
  document.getElementById('image-viewer').classList.remove('hidden');
  document.getElementById('viewer-title').textContent = sol.name + ' \u2014 ' + selectedModel.name;

  // أعد ضبط الحالة
  document.getElementById('viewer-loading').classList.remove('hidden');
  document.getElementById('viewer-error').classList.remove('show');
  var img = document.getElementById('viewer-img');
  img.style.display='none';
  img.src='';
  resetZoom();

  // بناء الرابط المباشر من GitHub
  var url = buildURL(selectedBrand.folder, selectedModel.folder, sol.file);
  document.getElementById('err-path-text').textContent = url;

  // تحميل الصورة
  img.onload = function(){
    document.getElementById('viewer-loading').classList.add('hidden');
    img.style.display='block';
  };
  img.onerror = function(){
    document.getElementById('viewer-loading').classList.add('hidden');
    document.getElementById('viewer-error').classList.add('show');
  };
  img.src = url;
}

// ============ CLOSE VIEWER ============
window.closeViewer=function(){
  document.getElementById('image-viewer').classList.add('hidden');
  var img=document.getElementById('viewer-img');
  img.src=''; img.style.display='none';
  document.getElementById('viewer-error').classList.remove('show');
  document.getElementById('viewer-loading').classList.remove('hidden');
  resetZoom();
};

// ============ PINCH ZOOM ============
var sc=1, ld=0, ss=1, drag=false, lx=0, ly=0, tx=0, ty=0;
var imgEl=document.getElementById('viewer-img');
var vcont=document.getElementById('viewer-img-container');

vcont.addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    ld=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    ss=sc;
  } else if(e.touches.length===1&&sc>1){
    drag=true; lx=e.touches[0].clientX; ly=e.touches[0].clientY;
  }
},{passive:true});

vcont.addEventListener('touchmove',function(e){
  if(e.touches.length===2){
    e.preventDefault();
    var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    sc=Math.min(5,Math.max(1,ss*(d/ld)));
    applyZoom();
  } else if(e.touches.length===1&&drag){
    e.preventDefault();
    tx+=e.touches[0].clientX-lx; ty+=e.touches[0].clientY-ly;
    lx=e.touches[0].clientX; ly=e.touches[0].clientY;
    applyZoom();
  }
},{passive:false});

vcont.addEventListener('touchend',function(e){
  if(e.touches.length<2) drag=false;
  if(sc<=1) resetZoom();
});

var lt=0;
vcont.addEventListener('touchend',function(){
  var n=Date.now(); if(n-lt<300) resetZoom(); lt=n;
});

function applyZoom(){ imgEl.style.transform='translate('+tx+'px,'+ty+'px) scale('+sc+')'; }
function resetZoom(){ sc=1; tx=0; ty=0; applyZoom(); }

// ============ NAV ============
function showScreen(name){
  ['brands','models','solutions'].forEach(function(s){
    document.getElementById('screen-'+s).classList.toggle('hidden',s!==name);
  });
  window.scrollTo({top:0,behavior:'smooth'});
}
window.goBack=function(to){
  if(to==='brands'){ selectedBrand=null; selectedModel=null; }
  if(to==='models'){ selectedModel=null; document.getElementById('model-search').value=''; renderModels(allModels); }
  showScreen(to); updateBreadcrumb();
};
function updateBreadcrumb(){
  var bc=document.getElementById('breadcrumb');
  var h='<span class="bc-item" onclick="goBack(\'brands\')">&#127968; الرئيسية</span>';
  if(selectedBrand) h+='<span class="bc-sep">&#8250;</span><span class="bc-item" onclick="goBack(\'models\')">'+selectedBrand.name+'</span>';
  if(selectedModel) h+='<span class="bc-sep">&#8250;</span><span class="bc-current">'+selectedModel.name+'</span>';
  bc.innerHTML=h;
}
