<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>مخططات الحلول الجاهزة - نسخة مبسطة</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: linear-gradient(145deg, #0d0f1a 0%, #1a1f30 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .container { width: 100%; max-width: 1400px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-radius: 40px; padding: 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); }
        h1 { color: #fff; text-align: center; font-size: 2.5rem; margin-bottom: 30px; text-shadow: 0 0 20px rgba(0,255,255,0.7); }
        .panels { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .panel { flex: 1 1 250px; background: rgba(10,20,30,0.7); backdrop-filter: blur(5px); border-radius: 30px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); min-width: 250px; }
        .panel-header { display: flex; align-items: center; gap: 10px; color: #00f7ff; font-size: 1.8rem; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .panel-header i { font-size: 2rem; color: #ffd700; }
        .items-container { display: flex; flex-direction: column; gap: 12px; }
        .item-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 15px 20px; border-radius: 50px; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        .item-btn i { font-size: 1.4rem; color: #00ffff; width: 30px; }
        .item-btn:hover { background: rgba(0,255,255,0.15); border-color: #00ffff; transform: scale(1.02); }
        .item-btn.selected { background: rgba(0,255,255,0.25); border-color: #ffd700; }
        .solutions-panel .item-btn i { color: #ffd700; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { position: relative; max-width: 90%; max-height: 90%; border-radius: 20px; overflow: hidden; background: #000; }
        .modal-content img { width: 100%; height: auto; display: block; }
        .close-modal { position: absolute; top: 15px; left: 15px; font-size: 40px; color: white; cursor: pointer; background: rgba(0,0,0,0.5); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .close-modal:hover { background: #ff0000; }
        .loading-spinner { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); border: 5px solid rgba(255,255,255,0.3); border-top: 5px solid #00ffff; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: translate(-50%,-50%) rotate(0deg); } 100% { transform: translate(-50%,-50%) rotate(360deg); } }
        .info-message { color: rgba(255,255,255,0.6); text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ مخططات الحلول الجاهزة ✨</h1>
        <div class="panels">
            <!-- Brand Panel -->
            <div class="panel">
                <div class="panel-header"><i class="fas fa-tag"></i><h2>البراندات</h2></div>
                <div class="items-container" id="brandsList"></div>
            </div>
            <!-- Models Panel -->
            <div class="panel">
                <div class="panel-header"><i class="fas fa-mobile-alt"></i><h2>الموديلات</h2></div>
                <div class="items-container" id="modelsList">
                    <div class="info-message">اختر برانداً أولاً</div>
                </div>
            </div>
            <!-- Solutions Panel -->
            <div class="panel">
                <div class="panel-header"><i class="fas fa-microchip"></i><h2>الحلول</h2></div>
                <div class="items-container" id="solutionsList">
                    <div class="info-message">اختر موديلاً أولاً</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Image Modal -->
    <div class="modal" id="imageModal">
        <span class="close-modal" id="closeModal">&times;</span>
        <div class="modal-content">
            <img id="modalImage" src="" alt="مخطط الدائرة">
            <div class="loading-spinner" id="loadingSpinner"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <script>
        // ------------------- إعدادات Firebase -------------------
        const firebaseConfig = {
            apiKey: "AIzaSyDKntmfI8dloN1Xx-TJw9m8S1OXbem6hNs",
            authDomain: "hardware-solotion.firebaseapp.com",
            projectId: "hardware-solotion",
            storageBucket: "hardware-solotion.firebasestorage.app",
            messagingSenderId: "586335779001",
            appId: "1:586335779001:web:09b94e39c5db11ea714368"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ------------------- قائمة الحلول -------------------
        const solutions = [
            { name: "دائرة الإضاءة", file: "flash" },
            { name: "دائرة الشحن", file: "charging" },
            { name: "دائرة الصوت", file: "audio" },
            { name: "دائرة الواي فاي والبلوتوث", file: "wifi" },
            { name: "دائرة التشغيل", file: "power" },
            { name: "دائرة اللمس", file: "touch" },
            { name: "فولتات الباور", file: "voltages" },
            { name: "أسماء المكونات", file: "components" }
        ];

        // ------------------- بيانات GitHub -------------------
        // غير الرقمين دول لبياناتك:
        const GITHUB_USERNAME = "mohamd07917-creator";
        const GITHUB_REPO = "hardware-solution";

        // ------------------- متغيرات -------------------
        let currentBrand = null;
        let currentModel = null;
        let brands = [];
        let models = [];

        // ------------------- تحميل البراندات -------------------
        async function loadBrands() {
            const brandsDiv = document.getElementById('brandsList');
            brandsDiv.innerHTML = '<div class="info-message">جاري التحميل...</div>';
            
            try {
                const snapshot = await db.collection('brands').get();
                brandsDiv.innerHTML = '';
                
                if (snapshot.empty) {
                    brandsDiv.innerHTML = '<div class="info-message">لا توجد براندات</div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const brandName = doc.data().name;
                    brands.push(brandName);
                    
                    const btn = document.createElement('div');
                    btn.className = 'item-btn';
                    btn.innerHTML = `<i class="fas fa-certificate"></i> ${brandName}`;
                    btn.onclick = () => selectBrand(brandName, btn);
                    brandsDiv.appendChild(btn);
                });
            } catch (error) {
                brandsDiv.innerHTML = '<div class="info-message">خطأ في التحميل</div>';
            }
        }

        // ------------------- اختيار براند -------------------
        async function selectBrand(brandName, btnElement) {
            // إزالة التحديد من كل الأزرار
            document.querySelectorAll('#brandsList .item-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            
            currentBrand = brandName;
            currentModel = null;
            
            // تحميل الموديلات
            const modelsDiv = document.getElementById('modelsList');
            modelsDiv.innerHTML = '<div class="info-message">جاري التحميل...</div>';
            
            try {
                const snapshot = await db.collection('models').where('brandId', '==', brandName).get();
                modelsDiv.innerHTML = '';
                
                if (snapshot.empty) {
                    modelsDiv.innerHTML = '<div class="info-message">لا توجد موديلات</div>';
                    return;
                }

                snapshot.forEach(doc => {
                    const modelName = doc.data().name;
                    
                    const btn = document.createElement('div');
                    btn.className = 'item-btn';
                    btn.innerHTML = `<i class="fas fa-phone"></i> ${modelName}`;
                    btn.onclick = () => selectModel(modelName, btn);
                    modelsDiv.appendChild(btn);
                });
            } catch (error) {
                modelsDiv.innerHTML = '<div class="info-message">خطأ في التحميل</div>';
            }
            
            // إخفاء الحلول
            document.getElementById('solutionsList').innerHTML = '<div class="info-message">اختر موديلاً أولاً</div>';
        }

        // ------------------- اختيار موديل -------------------
        function selectModel(modelName, btnElement) {
            document.querySelectorAll('#modelsList .item-btn').forEach(b => b.classList.remove('selected'));
            btnElement.classList.add('selected');
            
            currentModel = modelName;
            
            // عرض الحلول
            const solutionsDiv = document.getElementById('solutionsList');
            solutionsDiv.innerHTML = '';
            
            solutions.forEach(sol => {
                const btn = document.createElement('div');
                btn.className = 'item-btn';
                btn.innerHTML = `<i class="fas fa-circle"></i> ${sol.name}`;
                btn.onclick = () => showImage(sol.file);
                solutionsDiv.appendChild(btn);
            });
        }

        // ------------------- عرض الصورة -------------------
        function showImage(fileName) {
            if (!currentBrand || !currentModel) {
                alert('الرجاء اختيار براند وموديل أولاً');
                return;
            }

            const cleanModel = currentModel.replace(/\s+/g, '_');
            const imageUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${GITHUB_REPO}/main/images/${currentBrand}/${cleanModel}/${fileName}.png`;

            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            const spinner = document.getElementById('loadingSpinner');

            modal.classList.add('active');
            modalImg.style.display = 'none';
            spinner.style.display = 'block';

            fetch(imageUrl, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        modalImg.src = imageUrl;
                        modalImg.style.display = 'block';
                    } else {
                        alert('الصورة غير موجودة');
                        modal.classList.remove('active');
                    }
                    spinner.style.display = 'none';
                })
                .catch(() => {
                    alert('فشل تحميل الصورة');
                    spinner.style.display = 'none';
                    modal.classList.remove('active');
                });
        }

        // ------------------- إغلاق النافذة -------------------
        document.getElementById('closeModal').onclick = () => {
            document.getElementById('imageModal').classList.remove('active');
            document.getElementById('modalImage').src = '';
        };

        window.onclick = (e) => {
            const modal = document.getElementById('imageModal');
            if (e.target === modal) {
                modal.classList.remove('active');
                document.getElementById('modalImage').src = '';
            }
        };

        // ------------------- تشغيل البرنامج -------------------
        loadBrands();
    </script>
</body>
</html>
